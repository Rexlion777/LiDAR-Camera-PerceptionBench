name: Core tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev,visualization]"
      - name: Compile source
        run: python -m compileall -q runtime scripts tests
      - name: Run dependency-light core tests
        run: >-
          pytest -q
          tests/test_lidar_calibration.py
          tests/test_lidar_transforms.py
          tests/test_lidar_tracking.py
          tests/test_lidar_tracking_optimized.py
          tests/test_lidar_dbscan_baseline.py
          tests/test_lidar_failure_matcher.py
