<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">LiDAR-Camera PerceptionBench result summary</title>
  <desc id="desc">PointPillars accuracy, TensorRT acceleration, tracking optimization and degradation testing summary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#101d34"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#47d7ff"/><stop offset="1" stop-color="#7c6cff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#47d7ff"/></marker>
  </defs>
  <rect width="1440" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1320" cy="40" r="230" fill="#1b5cff" opacity=".10"/>
  <circle cx="70" cy="680" r="260" fill="#15d6b4" opacity=".07"/>
  <rect x="70" y="60" width="8" height="84" rx="4" fill="url(#accent)" filter="url(#glow)"/>
  <text x="105" y="98" fill="#eef6ff" font-family="Inter,Arial,sans-serif" font-size="38" font-weight="700">LiDAR-Camera PerceptionBench</text>
  <text x="105" y="137" fill="#8fa7c3" font-family="Inter,Arial,sans-serif" font-size="22">Detection · Calibration/Sync · Degradation · TensorRT Deployment</text>

  <g font-family="Inter,Arial,sans-serif">
    <g transform="translate(70 205)">
      <rect width="305" height="235" rx="24" fill="#13243d" stroke="#254264"/>
      <text x="26" y="45" fill="#8fa7c3" font-size="19">KITTI validation</text>
      <text x="26" y="102" fill="#58dcff" font-size="45" font-weight="750">3,769</text>
      <text x="26" y="137" fill="#eef6ff" font-size="19">frames · official evaluator</text>
      <text x="26" y="181" fill="#b8c8db" font-size="17">Moderate 3D AP</text>
      <text x="26" y="211" fill="#eef6ff" font-size="18">Car 50.22 · Ped 23.90 · Cyc 45.77</text>
    </g>
    <g transform="translate(400 205)">
      <rect width="305" height="235" rx="24" fill="#13243d" stroke="#254264"/>
      <text x="26" y="45" fill="#8fa7c3" font-size="19">TensorRT core</text>
      <text x="26" y="105" fill="#69e3bc" font-size="44" font-weight="750">6.75 → 3.64</text>
      <text x="26" y="139" fill="#eef6ff" font-size="19">ms · 1.86× speedup</text>
      <text x="26" y="181" fill="#b8c8db" font-size="17">Online end-to-end</text>
      <text x="26" y="211" fill="#eef6ff" font-size="18">33.08 → 28.48 ms</text>
    </g>
    <g transform="translate(730 205)">
      <rect width="305" height="235" rx="24" fill="#13243d" stroke="#254264"/>
      <text x="26" y="45" fill="#8fa7c3" font-size="19">Tracking association</text>
      <text x="26" y="105" fill="#a99aff" font-size="44" font-weight="750">47.27 → 0.836</text>
      <text x="26" y="139" fill="#eef6ff" font-size="19">ms · 56.6× speedup</text>
      <text x="26" y="181" fill="#b8c8db" font-size="17">Vectorized gating</text>
      <text x="26" y="211" fill="#eef6ff" font-size="18">with local assignment fallback</text>
    </g>
    <g transform="translate(1060 205)">
      <rect width="305" height="235" rx="24" fill="#13243d" stroke="#254264"/>
      <text x="26" y="45" fill="#8fa7c3" font-size="19">Acceptance matrix</text>
      <text x="26" y="105" fill="#ffcf72" font-size="44" font-weight="750">107 / 11,200</text>
      <text x="26" y="139" fill="#eef6ff" font-size="19">settings / frame-runs</text>
      <text x="26" y="181" fill="#b8c8db" font-size="17">Sparsity · noise · range</text>
      <text x="26" y="211" fill="#eef6ff" font-size="18">threshold · calibration · time</text>
    </g>
  </g>

  <rect x="70" y="480" width="1295" height="150" rx="24" fill="#0c192c" stroke="#254264"/>
  <text x="98" y="526" fill="#eef6ff" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">Deployment boundary</text>
  <text x="98" y="568" fill="#b8c8db" font-family="Inter,Arial,sans-serif" font-size="20">OpenPCDet preprocessing + PyTorch VFE/scatter</text>
  <path d="M575 559h90" stroke="#47d7ff" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="690" y="568" fill="#69e3bc" font-family="Inter,Arial,sans-serif" font-size="20">TensorRT BEV backbone + dense head</text>
  <path d="M1090 559h70" stroke="#47d7ff" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1180" y="568" fill="#b8c8db" font-family="Inter,Arial,sans-serif" font-size="20">Native post-process</text>
  <text x="98" y="606" fill="#7890ac" font-family="Inter,Arial,sans-serif" font-size="17">Accuracy parity is measured at the declared boundary; this repository does not claim a full TensorRT detector.</text>
  <text x="70" y="674" fill="#657c99" font-family="Inter,Arial,sans-serif" font-size="16">Public KITTI/OpenPCDet validation · no private project data, weights, or engines included</text>
</svg>
